<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Заголовок подставляется из webpack конфига -->
    <title><%= htmlWebpackPlugin.options.title %></title>
</head>
<body>
    <div class="app">
        <!-- Контейнер для позиционирования UI поверх canvas -->
        <div class="game-container">
            <!-- Игровой холст -->
            <canvas id="gameCanvas" class="canvas" width="800" height="600"></canvas>
            <!-- Интерфейс: отображается поверх canvas -->
            <div class="ui">
                <div class="ui__stats">
                    <div class="ui__stat">Столкновений: <span id="collisionCount">0</span></div>
                    <div class="ui__stat">FPS: <span id="fpsValue">0</span></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
